<body>
    <img src="Screenshot 2025-12-28 223607.png" height="250" alt="Train image">

    <br>    <!-- br is break page --> 

    <table>

        <tr>                         <!-- tr means table row -->

        <tr>
            <td>Ayush</td>               <!-- tr means table data -->

        </tr>

        <tr>
            <td colspan="2">sam</td>      <!-- colspan means sam will takespace of two column -->       
            <td rowspan="2">Developer</td><!-- rowspan means developer will takespace of two row -->
        </tr>

        <tr>
            <td colspan="2">sam</td>             
        </tr>
    </table>
    
<!--                              LISTS                      -->


<ul type ='square'>             <!--ul means unordered list -->

    <li>harry</li>
    
</ul>

<ol type = 'A'>                                 <!--ol means ordered list -->
    <li>rohan</li>

    <li>harry</li>

</ol>



<dl>                        <!-- dl meansdefination list -->

    <!--dd means defination defination-->
</dl>

</body>
</html>
